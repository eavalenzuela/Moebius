global:
  imageRegistry: ghcr.io/eavalenzuela

api:
  replicaCount: 3
  image:
    repository: moebius-api
    tag: ""  # defaults to chart appVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    minAvailable: 2
  service:
    type: ClusterIP
    port: 8080
  env:
    HTTP_PORT: "8080"
    TLS_MODE: passthrough
    STORAGE_BACKEND: s3
    LOG_LEVEL: info
    LOG_FORMAT: json

scheduler:
  # Scheduler uses PG advisory-lock leader election; only one pod does work
  # at a time. Run 2 for hot-standby failover.
  replicaCount: 2
  image:
    repository: moebius-scheduler
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    LOG_LEVEL: info
    LOG_FORMAT: json
    REAPER_DISPATCHED_TIMEOUT_SECONDS: "300"
    REAPER_INFLIGHT_TIMEOUT_SECONDS: "3600"

ui:
  replicaCount: 2
  image:
    repository: moebius-ui
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80

postgres:
  external: true
  # The DATABASE_URL is loaded from the moebius-db secret (see secrets.databaseUrl
  # below). Production deployments MUST use sslmode=require or sslmode=verify-full
  # — Moebius traffic to the database carries credentials, tenant identifiers, and
  # audit-log writes that should never traverse a network in plaintext.
  url: ""  # set via secret

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: manage.example.com
  tls: true
  tlsSecretName: moebius-tls

storage:
  backend: s3
  s3:
    endpoint: ""
    bucket: ""
    region: ""
    credentialsSecret: moebius-s3-credentials

secrets:
  # databaseUrl is the full PostgreSQL connection string, written into the
  # moebius-db Secret as DATABASE_URL. Production deployments MUST set
  # sslmode=require (minimum) or sslmode=verify-full (preferred — verifies the
  # server cert chain and hostname). Examples:
  #   postgres://moebius:PASS@db.internal:5432/moebius?sslmode=require
  #   postgres://moebius:PASS@db.internal:5432/moebius?sslmode=verify-full&sslrootcert=/etc/ssl/db-ca.pem
  # Leave empty here and create the moebius-db secret out-of-band (see
  # docs/Deployment_Instructions.md § Database TLS).
  databaseUrl: ""
  caKeyPath: /certs/intermediate-ca.key
  caCertPath: /certs/intermediate-ca.crt
  caSecret: moebius-ca-certs

migrations:
  enabled: true
