{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/component: migrate
    {{- include "moebius.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade,pre-install
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "moebius.image" (dict "global" .Values.global "image" .Values.api.image "appVersion" .Chart.AppVersion) }}
          args: ["migrate"]
          env:
            - name: CA_CERT_PATH
              value: "/dev/null"
            - name: CA_KEY_PATH
              value: "/dev/null"
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-db
{{- end }}
