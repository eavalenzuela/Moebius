{{- if not .Values.nats.external }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-nats
  labels:
    app.kubernetes.io/component: nats
    {{- include "moebius.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-nats
  replicas: {{ if .Values.nats.cluster.enabled }}{{ .Values.nats.cluster.replicas }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nats
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.nats.image.pullPolicy }}
          args:
            - "-js"
            - "-sd"
            - "/data"
            {{- if .Values.nats.cluster.enabled }}
            - "--cluster"
            - "nats://0.0.0.0:6222"
            - "--cluster_name"
            - "moebius-nats"
            - "--routes"
            - "nats://{{ .Release.Name }}-nats-0.{{ .Release.Name }}-nats:6222,nats://{{ .Release.Name }}-nats-1.{{ .Release.Name }}-nats:6222,nats://{{ .Release.Name }}-nats-2.{{ .Release.Name }}-nats:6222"
            {{- end }}
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.nats.storage.storageClassName }}
        storageClassName: {{ .Values.nats.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nats.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nats
  labels:
    app.kubernetes.io/component: nats
    {{- include "moebius.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: cluster
      port: 6222
      targetPort: cluster
  selector:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
