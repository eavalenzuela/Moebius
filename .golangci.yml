version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US
      extra-words:
        - typo: "cancelled"
          correction: "cancelled"

formatters:
  enable:
    - gofmt
