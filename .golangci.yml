version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell

formatters:
  enable:
    - gofmt

settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
  misspell:
    locale: US
    extra-words:
      - typo: "cancelled"
        correction: "cancelled"
